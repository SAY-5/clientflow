name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: clientflow
          POSTGRES_PASSWORD: clientflow
          POSTGRES_DB: clientflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U clientflow"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://clientflow:clientflow@localhost:5432/clientflow
      REQUIRE_DB: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        working-directory: backend
        run: ruff check app tests
      - name: Mypy
        working-directory: backend
        run: mypy app
      - name: Pytest with coverage gate
        working-directory: backend
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=86

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        working-directory: web
        run: npm ci
      - name: Lint
        working-directory: web
        run: npm run lint
      - name: Typecheck
        working-directory: web
        run: npm run typecheck
      - name: Test
        working-directory: web
        run: npm run test
      - name: Build
        working-directory: web
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, web]
    steps:
      - uses: actions/checkout@v4
      - name: Build and start the stack
        run: docker compose up -d --build
      - name: Wait for the API
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then echo; echo up; exit 0; fi
            sleep 2
          done
          docker compose logs
          exit 1
      - name: Wait for the UI
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5173 >/dev/null; then echo up; exit 0; fi
            sleep 2
          done
          docker compose logs web
          exit 1
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web deps
        working-directory: web
        run: npm ci
      - name: Install Playwright browser
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: Run e2e
        working-directory: web
        env:
          E2E_BASE_URL: http://localhost:5173
        run: npm run e2e
      - name: Stop the stack
        if: always()
        run: docker compose down

  bench-regress:
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Benchmark
        working-directory: backend
        run: python -m bench.benchmark
      - name: Regression gate
        working-directory: backend
        run: python -m bench.regress

  build-images:
    runs-on: ubuntu-latest
    needs: [backend, web]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t clientflow-backend ./backend
      - name: Build web image
        run: docker build -t clientflow-web ./web
