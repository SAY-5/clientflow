services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: clientflow
      POSTGRES_PASSWORD: clientflow
      POSTGRES_DB: clientflow
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clientflow"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://clientflow:clientflow@db:5432/clientflow
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  web:
    build: ./web
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "5173:80"
